---
# tasks file for roles/nginx_app
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
- name: Install nginx
  ansible.builtin.apt:
    name: "nginx={{ nginx_version }}"
    state: present
- name: Start and enable nginx
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true