apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-config-reader-binding
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-config-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-troubleshooting-ae.fullname" . }}-sa        
    namespace: {{ .Values.namespace }}
